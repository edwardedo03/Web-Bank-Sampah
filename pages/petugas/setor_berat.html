<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Petugas Setor Berat</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="../../assets/js/jquery-4.0.0.min.js"></script>
  </head>
  <body class="m-0 p-0 bg-[#F7FBF0] flex flex-row overflow-hidden">
    <nav
      class="flex-none w-1/6 bg-[#EBEFE5] h-screen flex flex-col justify-between p-6"
    >
      <div class="flex flex-col gap-10">
        <div class="flex flex-col">
          <h2 class="font-bold text-lg text-[#0D631B]">Bank Sampah Selaras</h2>
          <p class="text-xs text-gray-800/60">
            Recycle Today, Sustain Tomorrow
          </p>
          <p
            class="bg-[#0D631B]/30 text-[#0D631B] text-xs mt-4 font-semibold px-4 py-1 w-fit rounded-2xl hover:bg-[#0D631B] hover:text-[#CBFFC2] duration-200"
          >
            Petugas
          </p>
          <hr class="border-t-2 border-black/10 mt-5" />
        </div>
        <ul class="flex flex-col gap-1">
          <a href="./kelola_nasabah.html">
            <li
              class="font-bold text-[#40493D] hover:bg-[#2E7D32] hover:text-[#CBFFC2] px-4 py-3 text-sm rounded-lg duration-200 cursor-pointer active:scale-95"
            >
              Kelola Nasabah
            </li>
          </a>
          <a href="#">
            <li
              class="font-bold bg-[#2E7D32] text-[#CBFFC2] px-4 py-3 text-sm rounded-lg duration-200 cursor-pointer hover:scale-95 active:scale-95"
            >
              Setor Berat
            </li>
          </a>
          <a href="./profile_petugas.html">
            <li
              class="font-bold text-[#40493D] hover:bg-[#2E7D32] hover:text-[#CBFFC2] px-4 py-3 text-sm rounded-lg duration-200 cursor-pointer active:scale-95"
            >
              Profil Akun
            </li>
          </a>
        </ul>
      </div>

      <div class="flex flex-col gap-3">
        <button
          type="button"
          class="bg-red-800 text-white text-sm p-2 rounded-xl font-bold hover:bg-red-700 duration-200 active:scale-95"
          id="logout"
        >
          Logout
        </button>
      </div>
    </nav>
    <section
      class="flex-1 flex flex-col items-center p-10 gap-7 h-screen overflow-y-auto"
    >
      <div
        class="bg-white w-[70%] flex flex-col gap-5 py-8 px-10 rounded-xl shadow-md"
      >
        <div class="flex flex-col gap-1">
          <h1 class="text-2xl font-bold text-black">Cari Nasabah</h1>
          <p class="text-sm font-light text-black">
            Masukan identitas nasabah untuk memulai proses setor berat sampah
          </p>
        </div>

        <div class="flex flex-col gap-3 items-start w-full">
          <h3 class="text-md font-bold">Nama atau ID Nasabah</h3>
          <div
            class="shadow-md bg-[#F7FBF0] border-2 border-[#0D631B]/20 rounded-xl flex flex-row items-center py-1 px-3 w-full"
          >
            <img
              src="../../assets/icon/search.png"
              alt="icon-search"
              class="p-2 select-none"
            />
            <input
              id="cari-nasabah"
              type="text"
              placeholder="Susanto atau #36"
              class="p-1 px-3 w-full bg-transparent outline-none text-lg"
            />
          </div>
        </div>

        <div class="flex flex-col gap-4">
          <div class="flex flex-row justify-between items-center px-2">
            <p class="font-bold text-md">Hasil Pencarian</p>
            <p class="font-bold text-md text-[#0D631B]">
              <span id="nasabah-ketemu">-</span> Nasabah ditemukan
            </p>
          </div>
          <div
            class="shadow-md bg-[#F7FBF0] border-2 border-[#0D631B]/20 rounded-xl flex flex-row items-center gap-2 py-1 px-5 w-full justify-between"
          >
            <div class="flex flex-row gap-5 items-center py-2">
              <img
                src="../../assets/icon/profil-account/profil-account.png"
                alt="profile-icon"
                class="p-1 w-14 h-14 rounded-full bg-[#D9E6DA] select-none shadow-sm border-2 border-[#0D631B]/10"
              />
              <div class="flex flex-col">
                <p id="nama-nasabah" class="text-lg font-bold text-[#0D631B]">
                  Budi Susanto
                </p>
                <p id="id-nasabah" class="text-sm font-semibold text-[#0D631B]">
                  #84
                </p>
                <p
                  id="no-telepon-nasabah"
                  class="text-sm font-semibold text-[#0D631B]"
                >
                  0897 1234 5678
                </p>
              </div>
            </div>
            <button
              type="button"
              class="py-2 px-5 bg-[#0D631B] text-white rounded-lg font-semibold hover:bg-[#2E7D32] duration-200 active:scale-95"
            >
              Pilih
            </button>
          </div>
        </div>
      </div>
    </section>
  </body>
</html>
