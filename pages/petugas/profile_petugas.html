<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Profile Petugas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="../../assets/js/jquery-4.0.0.min.js"></script>
  </head>
  <body class="m-0 p-0 bg-[#F7FBF0] flex flex-row overflow-hidden">
    <nav
      class="flex-none w-1/6 bg-[#EBEFE5] h-screen flex flex-col justify-between p-6"
    >
      <div class="flex flex-col gap-10">
        <div class="flex flex-col">
          <h2 class="font-bold text-lg text-[#0D631B]">Bank Sampah Selaras</h2>
          <p class="text-xs text-gray-800/60">
            Recycle Today, Sustain Tomorrow
          </p>
          <p
            class="bg-[#0D631B]/30 text-[#0D631B] text-xs mt-4 font-semibold px-4 py-1 w-fit rounded-2xl hover:bg-[#0D631B] hover:text-[#CBFFC2] duration-200"
          >
            Petugas
          </p>
          <hr class="border-t-2 border-black/10 mt-5" />
        </div>
        <ul class="flex flex-col gap-1">
          <a href="./setor_berat.html">
            <li
              class="font-bold text-[#40493D] hover:bg-[#2E7D32] hover:text-[#CBFFC2] px-4 py-3 text-sm rounded-lg duration-200 cursor-pointer active:scale-95"
            >
              Setor Berat
            </li>
          </a>
          <a href="#">
            <li
              class="font-bold bg-[#2E7D32] text-[#CBFFC2] px-4 py-3 text-sm rounded-lg duration-200 cursor-pointer hover:scale-95 active:scale-95"
            >
              Profil Akun
            </li>
          </a>
        </ul>
      </div>

      <div class="flex flex-col gap-3">
        <button
          type="button"
          class="bg-red-800 text-white text-sm p-2 rounded-xl font-bold hover:bg-red-700 duration-200 active:scale-95"
          id="logout"
        >
          Logout
        </button>
      </div>
    </nav>
    <section
      class="flex-1 flex flex-col justify-start items-start p-10 h-screen overflow-y-auto w-full items-center"
    >
      <div class="w-[85%] flex flex-col gap-5 items-center">
        <div
          class="flex flex-row gap-8 shadow-md border-2 border-[#0D631B]/20 rounded-xl p-7 bg-white w-full"
        >
          <img
            src="../../assets/img/orang-profile.png"
            alt="foto-profile"
            class="border-4 rounded-full border-[#A3F69C]/70 select-none shadow-md"
          />
          <div class="flex flex-col gap-2 items-start justify-between">
            <h2 class="text-2xl font-bold text-black" id="username-title">
              Your Name
            </h2>
            <p class="font-light text-md text-black mb-1">
              ID Petugas: #<span id="id-petugas">0000</span>
            </p>
            <p
              class="bg-[#0D631B] py-1 px-5 rounded-3xl text-[#F7FBF0] font-semibold text-sm"
            >
              Petugas Aktif
            </p>
          </div>
        </div>

        <div
          class="flex flex-row justify-between py-3 px-5 bg-[#E5EADF] rounded-xl shadow-md border-gray-700/70 w-full"
        >
          <div class="flex flex-row gap-3 items-center">
            <img
              src="../../assets/icon/calendar.png"
              alt="calendar"
              class="select-none"
            />
            <p class="font-semibold">
              Bergabung sejak
              <span id="tanggal-bergabung-petugas">-</span>
            </p>
          </div>
          <div class="flex flex-row gap-3 items-center">
            <svg
              width="22"
              height="21"
              viewBox="0 0 22 21"
              fill="none"
              xmlns="http://www.w3.org/2000/svg"
              class="select-none"
            >
              <path
                d="M7.6 21L5.7 17.8L2.1 17L2.45 13.3L0 10.5L2.45 7.7L2.1 4L5.7 3.2L7.6 0L11 1.45L14.4 0L16.3 3.2L19.9 4L19.55 7.7L22 10.5L19.55 13.3L19.9 17L16.3 17.8L14.4 21L11 19.55L7.6 21ZM9.95 14.05L15.6 8.4L14.2 6.95L9.95 11.2L7.8 9.1L6.4 10.5L9.95 14.05Z"
                fill="green"
              />
            </svg>
            <span id="verifikasi-status" class="font-semibold"
              >Terverifikasi</span
            >
          </div>
        </div>

        <div
          class="flex flex-col gap-2 bg-white rounded-xl shadow-md order-2 border-[#0D631B]/20 px-7 py-5 w-full"
        >
          <div>
            <h3 class="font-bold text-lg">Data Diri Petugas</h3>
            <p class="mb-3 font-semibold text-sm">
              Pastikan data sesuai dengan KTP
            </p>
            <hr class="border-t-2 border-black/20" />
          </div>
          <form
            id="form-update-profile"
            action=""
            class="w-full flex flex-col justify-between items-start gap-5"
          >
            <div
              class="flex flex-col items-start gap-2 text-md font-semibold w-full"
            >
              <p>Username</p>
              <input
                id="username"
                type="text"
                placeholder="Budi.Herman98"
                class="focus:ring-4 focus:ring-[#0D631B]/10 duration-200 border-2 border-[#0D631B]/20 w-full shadow-md rounded-lg p-2"
                disabled
              />
            </div>

            <div
              class="flex flex-col items-start gap-2 text-md font-semibold w-full"
            >
              <p>Nama Lengkap</p>
              <input
                id="nama"
                type="text"
                placeholder="Budi Hermanus"
                class="focus:ring-4 focus:ring-[#0D631B]/10 duration-200 border-2 border-[#0D631B]/20 w-full shadow-md rounded-lg p-2"
              />
            </div>

            <div
              class="flex flex-col items-start gap-2 text-md font-semibold w-full"
            >
              <p>Email</p>
              <input
                id="email"
                type="email"
                placeholder="budi.hermanus@gmail.com"
                class="focus:ring-4 focus:ring-[#0D631B]/10 duration-200 border-2 border-[#0D631B]/20 w-full shadow-md rounded-lg p-2"
              />
            </div>

            <div
              class="flex flex-col items-start gap-2 text-md font-semibold w-full"
            >
              <p>Nomor WhatsApp</p>
              <div class="flex flex-row gap-3 items-center w-full">
                <p>+62</p>
                <input
                  id="no-telepon"
                  type="number"
                  pattern="[0-9]*"
                  placeholder="895 1234 5678"
                  class="focus:ring-4 focus:ring-[#0D631B]/10 duration-200 border-2 border-[#0D631B]/20 w-full shadow-md rounded-lg p-2"
                />
              </div>
            </div>

            <div
              class="flex flex-col items-start gap-2 text-md font-semibold w-full"
            >
              <p>Wilayah Tugas</p>
              <input
                id="wilayah-tugas"
                type="text"
                placeholder="Pagedangan"
                class="focus:ring-4 focus:ring-[#0D631B]/10 duration-200 border-2 border-[#0D631B]/20 w-full shadow-md rounded-lg p-2"
              />
            </div>

            <button
              id="simpan-perubahan"
              type="submit"
              class="flex flex-row gap-2 items-center text-md font-bold text-white bg-[#0D631B] p-3 rounded-xl hover:bg-[#2E7D32] duration-200 w-full justify-center"
            >
              <img
                src="../../assets/icon/save.png"
                alt="save-icon"
                class="select-none"
              />
              Simpan Perubahan
            </button>
          </form>
        </div>
      </div>
    </section>
  </body>
</html>
